body:
  text: 清涼山大華嚴寺沙門澄觀撰述第四法性融通門者謂若唯約事則互相礙不可即入若唯約理則唯一味無可即入第四法性融通門者謂真如既具過恆沙德如所起事亦具德無盡以真法性融通諸事故無礙也文中二先總後別總中亦二一揀非謂理事抗行不得事事無礙故是知有言須彌本不有芥子舊來空將空納不有何物不相容者斯言未當耳今則理事融通具斯無礙今則理事下第二顯正於中亦二先標舉謂不異理之一事具攝理性時令彼不異理之多事隨所依理皆於一中現後謂不異理之一事下別示其相於中四一順明以一切諸法皆依於理無離理者今一事全攝於理故帶一切事入一事中若一中攝理不盡則真理有分限失若一中攝理盡多事不隨理現則事在理外失二若一中下反立謂若攝理不盡則真理可分有一理二理乃至多理之失今真理湛然故不可分一味平等故無二理若遮此過云攝理盡而其多事不入一事者則不入之事在於理外便令理離於事而自入一事之中事離於理不來一事之內然離理有事事成定性離事有理理同斷故過尤深矣今既一事之中全攝理盡多事豈不一中現三今既下結成正義既離可分之過故全攝理盡又無事理相離之過故事隨理而頓現一事之中華藏品云華藏世界所有塵一一塵中見法界法界即事法界矣四華藏下引證可知斯即總意別亦具十玄門斯即等者第二別明也於中二先結前生後一既真理與一切法而共相應攝理無違即是諸門諸法同時具足後一既真理下正顯別相十門之義皆依真如別德而立下第八回向明真如具百門之德今略舉十四種德成十玄門一譬如真如與一切法而共相應及不相捨離二德成第一同時具足相應門二事既如理能包亦如理應遍而不壞狹相故有廣狹純雜無礙門又性常平等故純普攝諸法故雜二譬如真如性常平等及譬如真如普攝諸法二德成廣狹門三理既遍在一切多事故令一事隨理遍一切中遍理全在一事則一切隨理在一事中故有一多相容門三無所不在德成相入門四真理既不離諸法則一事即是真理真理即是一切事故是故此一即彼一切事一切即一反上可知故有相即自在門四不離諸法及與一切法同其體性二德成相即門五由真理在事各全非分故正在此時彼說為隱正在彼時此即為隱故有隱顯門五無有分限及恆守本性二德成隱顯門六真理既普攝諸法帶彼能依之事頓在一中故有微細門六普攝諸法德成微細門七此全攝理故能現一切彼全攝理同此頓現此現彼時彼能現所現俱現此中彼現此時此能現所現亦現彼中如是重重無盡故有帝網門以真如畢竟無盡故七畢竟無盡德成帝網門八即事即理故隨舉一事即真法門故有託事門八與一切法同其體性德成託事門九以真如遍在晝夜日月年劫皆全在故在日之時不異在劫故有十世異成門況時因法有法融時不融耶九遍在晝夜及遍在年劫二德成十世門十此事即理時不礙與餘一切恆相應滅有主伴門十性常隨順及與一切法恆共相應二德成主伴門疏中密用經文以經對疏一無差失設有不具經文意亦有之文中先別明十門故一理融通十門具矣後故一理下結也文並可知五如幻夢者猶如幻師能幻一物以為種種幻種種物以為一物等五如幻夢中二先幻後夢前中先喻後合前中正釋經云或現須臾作百年等後經云下引證此即晉經賢首品文等取下句云幻力自在悅世間若唐經云譬如幻師知幻法能現種種無量事須臾示作日月歲城邑豐饒大安樂等普賢行品云譬如工幻師示現種種事其來無所從去亦無所至幻性非有量亦復非無量於彼大衆中示現量無量等四十二經云佛子譬如幻師持呪得成能現種種差別形相呪與幻別而能作幻呪唯是聲而能幻作眼識所知種種諸色等十忍品云譬如幻非象非馬非車非步非男非女非童男非童女乃至云非一非異非廣非狹非多非少非量非無量非粗非細非是一切種種衆物種種非幻幻非種種然由幻故示現種種差別之事如是等文其處非一一切諸法業幻所作故一異無礙一切諸法等者合也華藏品云如幻師呪彼能現種種事衆生業力故國土不思議明知業即幻師又如中論偈云譬如幻化人復作幻化人如初幻化人是則名為業幻化人所作是名為業果等又十忍品云佛子此菩薩摩訶薩知一切法皆悉如幻從因緣起於一法中解多法於多法中解一法等偈中云衆生及國土種種業所造入於如幻際於彼無依著又偈云諸業從心生故說心如幻若離此分別普滅諸有趣斯則顯業自如幻矣又云度脫諸衆生令知法如幻衆生不異幻了幻無衆生等其文非一言如夢者如夢中所見廣大未離枕上歷時久遠未經斯須言如夢等者疏文分二先喻後引論證便當於合初中言所見廣大未離枕上者第六十經夢遊天宮喻云譬如有人於大會中昏睡安寢忽然夢見須彌山頂帝釋所住善見大城乃至云其人自見著天衣服普於其處住止周旋其大會中一切諸人雖同一處不知不見何以故夢中所見非彼大衆所能見故釋曰天宮廣大豈離枕上餘類此知昔人云枕上片時春夢中行盡江南數千里等亦時非離須臾也普賢行品云了達諸世間假名無有實衆生及世界如夢如光影於諸世間法不生分別見善離分別者亦不見分別無量無數劫解之即一念知念亦無念如是見世間無量諸國土一念悉超越經於無量劫不動於本處等如是自在皆由如夢故十忍品云譬如夢中見種種諸異相世間亦如是與夢無差別又云譬如夢所見長短等諸色如是等文其處非一皆以如夢長短即無長短故不礙長短也故論云處夢謂經年覺乃須臾項故時雖無量攝在一剎那故論云處夢謂經年等者二引證便合即無性攝論第六所引但言如有頌云斯即引經耳案西域傳云昔有隱士結廬屏跡博習伎術究極神理能使瓦礫為寶人畜易形但未能馭風雲陪仙駕閲圖考古更求仙術其方曰夫神仙者長生之術也將欲求學先定其志築建壇場命一烈士執長刀立壇隅屏息絶言自昏達曙求仙者中壇而坐手按長刀口誦神呪收視返聽達明登仙是人既得仙方而訪列士營求曠歲未諧心願後得烈士先與人傭力難辛五年一旦違失遂被笞辱又無所得悲號巡路隱士既見命以同遊來至茅廬以術力故化具肴饌已而令入池浴服以新衣又以五百金錢遺之曰盡當來求幸勿外也自時厥後數加重賂潛行陰德感激其心烈士囑求效命以報知己隱士曰我求烈士彌歷歲時幸而會遇奇貌應圖非有他故願一夕不聲耳烈士曰死尚不辭豈徒屏息於是設壇場受仙法依方行事坐待日曛曛暮之後各司其務隱士誦神呪烈士按銛刀殆將曉矣忽發聲叫是時空中火下烟𦦨雲蒸隱士疾引此人入池避難已而問曰誡子無聲何以驚叫烈士曰受命後至夜分惛然若夢變異更起見昔事主躬來慰謝感荷厚恩忍不報語彼人震怒遂見煞害受中陰身顧尸歎惜猶願歷世不言以報厚德遂見託生南印土大婆羅門家乃至受胎出胎備經苦厄荷恩負德忍而不言暨乎受業冠婚喪親生子每念前恩忍而不語宗親戚屬咸見怪異年過六十而有一子妻謂曰汝可言矣若不語者當煞汝子我時惟念已隔生世自顧衰老唯此稚子因止其妻令無煞害遂發此聲耳隱士曰我之過也此魔嬈耳烈士感恩悲事不成憤恚而死此即未經半宵已歷二生況年月耶此類甚多故知時處等皆如夢自在六如影像者一切萬法略有二義一皆如明鏡含明了性一心所成故二分別所現如影像故由初義故為能現由後義故為所現故一切法互為鏡像如鏡互照而不壞本相下經云遠物近物雖皆影現影不隨物而有遠近等六如影像等者文亦有二先正釋後引證前中然約鏡像喻鏡不是像像不是鏡故無鏡之能此但取像以況性空虗無之義今取即入自在故明一切具於鏡像二義故疏結云如鏡互照則一一法上有鏡有像也下經云下即十忍品彼云然諸衆生知於此處有是影現亦知彼處無如是影遠物近物雖皆影現影不隨物而有遠近菩薩摩訶薩亦復如是能知自身及以他身一切皆是智之境界不作二解謂自他別而於自國土於他國土各各差別一時普現釋曰若不如影何得諸處一時頓現故引遠近之言意取自在偈中云譬如水中影非內亦非外菩薩求菩提了世非世間不於世住出如影現世間入此甚深義離垢悉明徹不捨本誓心普照智慧燈世間無邊際智入悉齊等普化諸羣生令其捨衆著釋曰不了如影安能普入無邊之世七因無限者謂諸佛菩薩昔在因中常修緣起無性等觀大願回向等稱法界修及餘無量殊勝因故今如所起果具斯無礙七因無限者謂因多德遠因果相稱故但修一緣起之因則果中尚如緣起無礙況有無限之因無邊行海皆備修耶況一一行自復無盡如一慈門即有佛剎塵數況於餘門而云無性等觀者近等上四謂唯心所現觀法性融通觀如幻夢觀如影像觀兼緣起無性觀故總收前六因中皆為此觀觀法唯心乃至觀法如影像故用此六觀該一切法謂若染若淨若依若正若因若果同類異類是法所攝皆用六觀貫之故今成果如於六觀自在無礙二者等餘諸因齊佛所知普賢所行十方三世無盡無盡所有因門皆此門攝故云及餘無量殊勝因耳其大願回向稱法界修亦該通法界諸因言如所起果者如於昔因所得果故八證窮者由冥真性得如性用故經云無比功德故能爾八佛證窮者文中二先正釋但得成佛法爾能爾經云下引證無比功德即佛德也普賢行品云世界及如來種種諸名號經於無量劫說之不可盡何況最勝智三世諸佛法從於法界生充滿如來地明佛地德用不可說也又下偈云其中人師子修佛種種行成於等正覺示現諸自在此亦明因圓果滿故有大用耳前即德相此即業用九深定用故者謂海印定等諸三時力故賢首品云入微塵數諸三昧一一出生塵等定而彼微塵亦不增等九深定用中先正釋言海印定等者如下第六十一經略說一百門三昧及智論五百三昧等賢首品下引證而云等者有二義一只等此偈餘文文云於一普現難思剎彼一塵內衆多剎或有有佛或無佛或有雜染或清淨或有廣大或狹小等即是三昧現自在也二等餘經即彼次前偈云衆生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力如是等文其處非一十神通解脫故者謂由十通及不思議等解脫故不思議法品十種解脫中云於一塵中建立三世一切佛法等由上十因令前教義等十對具上同時等十門以為別教一乘義之分齊由上十因下第三總結所屬正結周遍含容以事事無礙故該取前三故皆別教分齊第四教所被機者夫教因機顯離機無言上說義深弘深未委被何根器若明能應者十身圓音今直彰所被第四教所被機中二先總後別前中初躡前起後後若明下約法揀定通有十類前五揀非器後五彰所為通有十類下第二別也於中先標二門後前中下別釋其相前中一無信非器以聞生誹謗墮惡道故二違真非器依謗此經以求名利不淨說法集邪善故下經云忘失菩提心修諸善根是為魔業三乖實非器謂如言取文超情至理不入心故論云隨聲取義有五過失隨聲取義有五過失者即十地論釋示說分齊中文論云一不正信二退勇猛三者誑他四者謗佛五者輕法下文具釋上三皆是凡愚故下文云此經不入餘衆生手四狹劣非器謂一切二乘出現品云一切二乘不聞此經何況受持故雖在坐如聾如瞽五守權非器謂三乘共教諸菩薩等隨宗所修行布行位不信圓融具德之法故下經云設有菩薩無量億那由他劫行六波羅蜜不聞此經或時聞已不信不解不順不入不得名為真實菩薩故下經云設有菩薩等者即出現品如前已引後五顯所為中一正為謂是一乘圓機故出現品云此經不為餘衆生說即通指前五唯為大乘不思議乘菩薩說即正為之機謂一運一切運圓融行位即深不思議又能遍達諸教即廣不思議故文云非餘境界之所知普賢行人方得入等二兼為謂即時雖未悟入而能信向成種如出現品食金剛喻故地獄天子十地頓超大海劫火不能為障約未悟入故名為兼地獄天子即隨好品大海劫火即十地品故彼偈云雖在海水劫火中堪受此法必得聞是也言約未悟入故名為兼者通外難也恐有難云既有頓超之益即是當機何名為兼通意可知三引為即前權教菩薩不受圓融之法故十地之中寄位顯勝借其三乘行布之名彼謂同於我法後因熏習方信入圓融以離此普法無所歸故權教極果無實事故權教極果無實事故者如有五教唯圓教因果俱有實事前四因中則有至果皆無由修權因若入地後即入實故猶如百川浩蕩千里亦無究竟歸處究竟歸處即是海故四者權為即是二乘謂既不聞況於受持故諸菩薩權示聲聞或在法會而聾盲彰其絶分或示在道而啓悟知可回心或在法會而聾盲等者釋其示相略有二類上即五百在本會中或示在道下即末會初六千比丘也五遠為謂諸凡夫外道闡提悉有佛性今雖不信後必當入五遠為中疏文有四一立理正明二出現品下引證三前三非器下會釋四又彼品下明惡是所為初一可知故出現品云如來智慧大藥王樹唯除二處不能為作生長利益所謂二乘墮無為坑及壞善根非器衆生溺大邪見貪愛之水然亦於彼曾無厭捨二即彼品見聞利益中文前三非器是溺邪見第四非器是隨深坑故皆揀之今四及五明佛無厭捨故示而誘之熏其成種前三非器下三會釋也一不信二違真三乖實然初一正是邪見二三非是邪見而皆配入邪見者然邪見有二一輕二重初一深重邪見二三即輕淺邪見謂但違真乖實皆邪見故又以經中但揀二處欲配前非器令盡故合入邪見之中第四非器即前狹劣二乘今四及五者即所為中四權為五遠為此二即曾無厭捨又彼品中明不信毀謗亦種善根謂謗雖墮惡由聞歷耳終省悟故又云如日亦與生盲作利益故又彼品中下第四明惡是所為於中二初正明為惡後況出圓融前中亦二先引二經明其為惡後引二經明等有性前中初云彼品亦即第十見聞利益中經云佛子我今告汝設有衆生見聞於佛業障纏覆不生信樂亦種善根無空過者乃至究竟入於涅槃謂謗雖墮惡下釋成上義謗既有益應可謗耶釋云為遠益故非無罪也故地獄天子或由謗故墮於地獄法華謗常不輕菩薩千劫於阿鼻地獄受大苦惱畢是罪已方受不輕教化故勿見謗有益便生誹謗又大般若中廣說謗法之罪謂此方墮阿鼻地獄此土劫壞罪猶未畢移置他方阿鼻地獄中他方復經劫壞罪亦未盡復移他方如是巡歷十方十方各經劫盡還生此土阿鼻地獄中千佛出世救之猶難若欲說其所受之身聞者當吐血而死故善現請說所受之身佛竟不說是知謗方等經非可輕也又入大乘論第一偈云誹謗大乘法決定趣惡道此人受業報實智之所說生墮地獄中大火熾然身焚燒甚苦痛業報罪信爾熾然大鐵犂具滿五百數而耕其舌上遍碎身苦惱故疏云謗雖墮惡言由聞歷耳者謂惡道罪畢由音謗時經目歷耳熏其成種故得益耳言終醒悟者即五十八經云但以曾發菩提心故終自醒悟言又云如日亦與等者出現身業中長行文廣今當引偈偈云譬如生盲不見日日光亦為作饒益令知時節受飲食永離衆患身安穩無信衆生不見佛而佛亦為興義利聞名及以觸光明因此乃至得菩提是也又如大海潛流喻中明無不具有如來智慧故又破塵出經卷喻中若除妄想皆見佛智故又如大海潛流下引二經明性等有初明具有後明皆見二經皆是出現意業之中前亦已引此皆明有自性住性即是所為況法性圓融感應交徹無有一法非所被此皆明有等者二正立理顯被圓融即舉況以釋然有二意一舉前況後明法普被謂但依生等有佛性尚皆普為況事事無礙何有非所被耶二者舉後況前謂約圓融一即一切則無情之境亦是所被況前等有佛性而揀之耶言被非情者以所被情即非情故一即一切無情豈非情耶況色性智性本無二體無有情外之非情故思之第五教體淺深者無盡教海體性難思從淺至深略明十體第五教體淺深中疏文分三初總次別後結總中亦三初標舉言淺深者十體之中前前淺後後深故下釋云從淺至深雖有淺深融通並為無盡教體一音聲言語體二名句文身體三通取四法體上三皆能詮體四通攝所詮體五諸法顯義體六攝境唯心體七會緣入實體八理事無礙體九事事無礙體十海印炳現體一一音聲下列名至文自顯十中前五唯體後五亦體亦性十中前五下三料揀總有四重一體性料揀相舉於外性主於內體者性相之通稱故若言體者通事通理若云性者唯約於理由後五中攝境唯心若約真心即通性故七所入實體即是性故八中理是性故九中必有理融事故十中無不具故是則約性亦體亦性約事但可稱體又前四通小後六唯大二又前四下大小乘料揀可知前七通三乘後三唯一乘三前七下三乘一乘料揀以會緣入實歸一實理即一乘故下三皆是一乘於義可知前八約同教後二唯別教四前八約同教下同教別教料揀謂七八雖一乘七多頓教中義八是終教中義故屬同教前八皆同於義可知同教皆有故事事無礙海印炳現若非別教一乘無此義也於後三重料揀則前前無後後後後兼前前可知就前三中大小乘中通用四法一聲二名三句四文取捨不同各有三說就前三中下第二別釋於中二先合釋前三後別釋後七今初以大小共同故合釋之於中三初雙標次雙釋後然大小諸宗下雙會小乘三者婆沙一百二十六云如是佛教以何為體小乘三者下第二雙釋先釋小乘中二先總徵一云應作是說語業為體謂佛語言詞唱評論語音語路語業語表是謂佛教一云下後別釋三釋即為三別今初語業為體者是標語即聲也謂佛語言下別顯其相謂言詞唱號評量論說言語音者謂如宮商角徵羽等亦如西方十四音即阿上阿長等言語路者言所行處瑜伽九十三云有情增語即是語路然瑜伽釋增語有二義一云增語是名名能詮表增勝於語二云有說意識名為增語今小乘不取於名正用意識是語行處亦是唇舌等言語業者即有業用如惡言既為惡業用佛之善言即善業用故梵行品云若語是梵行者梵行則是音聲風息唇舌喉吻吐納抑縱高低清濁此即語音語路又云若語業是梵行者梵行則是起居問訊略說廣說喻說直說讚說毀說安立說隨俗說顯了說斯即語業言語表者表亦是業然業有表無表別今但云表者婆沙一百二十六云但是語表而非無表者令他生正解故耳識所取故又二識所取無表唯一取故又三無數劫求此表故是謂佛教者結也正出今之教體而云佛教者一依根本故二依相似故三依隨順故佛依如是名句文身而說今亦隨之故其名句文但顯佛教作用不欲開示佛教自體發智論中亦同此說其名句下揀法亦通妨難故彼論自有難云若爾次後所說當云何通謂如說佛教名為何法答謂名句文身次第行列次第安布次第連合等為答此難故論有此通此難但牒後段之文故疏略耳二云名等為體謂名身句身文身次第行列次第安布次第連合故二名等為體等者此句標謂名身下列名次第下釋相次第釋上三名謂行列於名安布成句文為二依故云連合名等別相次下當釋聲但依於展轉因故謂語起名名能顯義聲但下揀法亦通妨難謂論有問言若爾此文所說當云何通如說佛教云何答謂佛語言詞唱評論語音語路語業語表是謂佛教為答此難故論有此通亦以此難但牒前文故疏略耳聲但依於展轉因故下論有喻云如世子孫展轉生法意云從父生子子言是其父之子雖語父名意在子體又子生孫孫是某孫雖舉其翁意在於孫孫如於義子如於名聲如於父則有三重中是教體故下合云謂語起名名能詮義即名展轉因也評家意取語業為體評家意取等者論評家釋云如是說者語業為體佛音所說他所聞故言評家者婆沙是諸羅漢同集而有四大羅漢為評家正義一世友二妙音三法救四覺天雜心論同俱舍論云牟尼說法蘊數有八十千彼體語或名此色行蘊攝謂若語為教體即色蘊攝名為教體即行蘊攝此乃雙存前二情無去取故致或言雜心論同俱舍者以彼論第一亦有此偈而文小異耳論偈云廣說諸法蘊其數有八萬戒等及餘法悉是五蘊攝長行釋云八萬法陰皆色陰攝以佛語語業性故有說名性者行陰攝又戒陰色陰攝定慧等行陰攝故與俱舍同也論云下引俱舍文阿以當於名等教中而引以其情無去取二義隨用故於此引雙證前二既許俱通故下第三為取四法之體在文易了正理論中意符名等故彼第三釋前頌竟又云詮義如實故名佛教名能詮義故教是名由是佛教定名為體舉名為首以攝句文顯宗即第三亦同此說正理論中意符名等者正成第二義也故彼論第三釋前頌意者以正理論總釋俱舍六百行頌俱義順婆沙正理故立順正理名然正釋上頌無異俱舍俱舍則情無去取正理則斷屬於名此中疏略彼有問曰語教異名教容是語名教別體教何是名此問意云教是言教語為教體則異汝名別有其體若以名為體名是不相應行非言教體何得以名等為教體耶論自答云彼作是釋要由有名乃說為教是故佛教體即是名所以者何詮義如實故名佛教下與疏全同此答意云雖名聲教若無名等詮其自性差別獨用於聲豈成於教故定用名等疏家存略但申正意足顯論旨三者然俱舍意情無去取若取其雙存即合四法以為教體若經部意亦唯取聲故正理十四破彼師云汝不應立名句文身即聲為體故正理十四破彼師云等者引此為成上來經部立聲為體論文繁廣今當略引令知其源論云此中經主作如是言豈不此三語為性故用聲為體色自性攝如何乃說為心不相應行此責非理所以者何由教及理知別有故教謂經言語身文身若文即語別說何為又說應持正法文句又言依義不依於文釋曰下廣引教證大意則同故論結云由此等教證知別有能詮諸義名句文身猶如語聲實而非假理謂現見有時得聲而不得字有時得字而不得聲故知體別有時得聲不得字者謂雖聞聲而不了義現見有人粗聞他語而復審問汝何所言此聞語聲不了義者都由未達所發文故如何乃執文不異聲有時得字不得聲者謂不聞聲而得了義現見有人不聞他語覩唇等動知其所說此不聞聲得了義者都由己達所發文故由斯理證文必異聲不更廣說大意同也論下又云隨思發語因語發字字復發名名方顯義由依如是展轉理門說語發名多能顯義如斯安立其理必然又次下云或如樹等大造合成非不緣斯別生於影影由假發而體非假如是諸文亦應總集別生名句而彼名句雖由假發而體非假此為善說理極成故又下結云故知離聲別有名等又下云故不應立名句文身即聲為體是故於我所說離聲有名等三能現義理今疏但引後結已顯正義耳大乘有三大意同前大乘有三下疏文分三初標次釋後以余下料揀一云攝假從實以聲為體離聲無別名句等故深密第五云如來言音略有三種一契經等既云言音有三明以聲為教體雜集論云成所引聲謂諸聖說一云攝假下第二釋也大乘通意以聲為實名句文三聲上假立經部師義參大乘故亦謂名等依聲假立言一契經等者此引稍略具云佛告曼殊室利菩薩曰善男子如來言音略有三種一者契經二者調伏三者本母下廣釋其相今疏所引但意在言音兩字耳雜集論云成所引聲謂諸聖所說者亦證唯聲為教體也既言聖說是聲明非名等為教體也即彼論第一釋外六界聲塵界云聲者四大種所造耳根所取義若可意若不可意若俱相違若因受大種若因不受大種若因俱大種若世所共成若成所引若遍計所執若聖言所攝若非聖言所攝如是十一種聲由五種因之所建立謂相故損益故因差別故說差別故言差別故相者謂耳根所取義說差別者謂世所共成等餘三如其所應因受大種者謂語等聲因不受大種者謂樹等聲因俱者謂手鼓等聲世所共成者謂世俗語所攝成所引者謂諸聖所說遍計所執者謂外道所說聖言非聖言所攝者謂依見等八種言說今疏但引成所引聲以證聲為教體耳然上五因攝十一者初一是總餘四是別損益立初三可意是益不可意是損俱相違通二因差別攝次三說差別攝次三言差別攝後二思之可知言八種言說者即八種聖語一見言見二不見言不見三聞言聞四不聞言不聞五覺言覺六不覺言不覺七知言知八不知言不知斯即為聖言所攝若見言不見等則非聖言二云以體從用名等為體能詮諸法自性差別二所依故故無性論破經部云諸契經句語為自性不應理故成唯識第二亦破彼云若名句文不異聲者法詞無礙境應無別唯識云此三離聲雖無別體而假實異亦不即聲二云以體等者義引論文然唯識第二破於小乘名等實有故彼論云復如何知異色心等有實詮表名句文身論主問也契經說故如契經說佛得希有名句文身外人答也此經不說異色心等有實名等為證不成論主總非下廣破竟論主結云語不異能詮人天共了執能詮異語天愛非餘下申正義云然依語聲分位差別而假建立名句文身名詮自性句詮差別文即是字為二所依此三離聲雖無別體而假實異亦不即聲由此法詞二無礙解境有差別聲與名等蘊界處攝亦各有異上即論文准彼論疏薩婆多雖有名由聲顯生二義論主取生破顯正理師救云聲上屈曲是名句文體異於聲而定實有故上論文廣破異聲實有名等故彼疏破竟結云故知但由無始慣習前語之聲分位力故後生解時謂聞名等其實耳等但能取得聲之自性剎那便謝意識於中詮解究竟名為名等非別實有是故汝等寧知異語別有能詮次假外問云既聲體即能詮如何有名等三種差別故論下申正義云然依語聲分位差別等於中有四一從初至假建立名句文身顯假差別此論主解依聲假立名句文身如梵音斫芻但言斫唯言芻未有所目說為字分位若二連合能詮法體詮於眼體說為名分位然未有句位更添言阿薩利縛名為眼有漏說為句位故依分位以立名等依一切立非自在故外又問曰雖言分位差別何者是也論云從名詮自性至為二所依述曰二顯二用殊名詮法自性句詮法差別文體是字為名句之所依不能詮自性及差別故文者彰義與二為依彰表二故又曰為顯與二為依能顯義故而體非顯字者無改轉義是其字體文是功能功能即體故言文即是字等或字為初首即多剎那聲集成一字集多字為所依次能成名詮諸法體集多名已復成句身詮法差別即雜集云自性差別及此二言如是三法總攝一切彼二言者即是字也字即語故說之為言名句二種所依止之言也瑜伽言名於自性施設句於差別施設名句所依止性說之為字又顯揚言句必有名名不必有句名必有字字不必有名如樞要說此下廣論自共相略不録之論此三離聲至亦不即聲述曰三明不即不離論主答難謂先有問言上來雖言名等即聲若名等是不相應行者色上曲屈非不相應聲何故爾故此答曰此三離聲雖無別體名等是假聲是實有假實異故故名等三非即是聲非聲處攝但是差別之聲義說名等以詮義故是不相應無別種子生故言即聲論由此法詞至亦各有異述曰外人問言若名等即聲法詞二無礙解境有何別答曰即此緣故二境有異法無礙解緣假名等詞無礙解緣實聲等故說境差別非二俱緣實雖二自性互不相離法對所詮故但取名詞多對機故但說聲耳聞聲已意了義故以所對不同說二有異非體有異也又此二境及名等三與聲別者蘊處界攝亦有異故色蘊行蘊聲處法處聲界法界如其次第攝聲名等問曰聲上屈曲假即言不相應色上屈曲假應非色處攝答聲上有教名等不相應色上無教故是色處攝問曰聲上屈曲即以為教色上有屈曲亦應得為教故論曰且依此土說名句文依聲假立非謂一切諸餘佛土亦依光明妙香味等假立三故述曰四會相違釋義可知所引即淨名經而言等者等取觸思數等上皆得假立名等三種亦是不相應攝此三法故以衆生機欲對待故假又梵云便善那此有四義一者扇二相好三根形四味此即是鹽能顯諸物中味故味即是文如言文義巧妙等目之為便善那此中四義總是一顯義故古德說名為味對法云此文名顯能顯彼義故為名句所依能顯義故惡察那是字是無改轉義如對法說鉢陀是迹如尋象迹以覓象等此名為句理應名迹義之迹故尋此知義也順古所翻稱之為句今疏總略以疏對論於義分明三云聲名句文合為其體由前二說皆有教理為定量故深密第四云不可捨於言說文字而能宣說故淨名云有以音聲語言文字而作佛事故十地論云說者以二事說聽者以二事聞謂善聲善字故深密第四至而能宣說等者彼無故字其說字下云是故我依般若波羅蜜多能取諸法無自性性意云由文字般若能顯實相般若既雙牒言說文字明通用四法下引淨名准之亦是第三香積品文十地論中善聲即聲善字即名句文故下引風畫二喻風喻音聲畫喻名句文並如下釋以余之意亦應雙取以余之意下第三料揀於中分二初直出正意意在雙取若就前二有去取者寧依名等二若就下會通前二於中五一正明去取良以音聲一種正就佛說容為教體流傳後代書之竹帛曾何有聲豈無教體二良以下出所以書雖是色亦與名等為所依故亦色蘊攝三書雖是色下遮妨難恐有難云疏不善法相書之以竹帛非名句文名句文身是不相應翰墨簡牘但是色法何得為體故此救云色與名等亦為所依何異聲為名等所依聲是色蘊所攝書字之色豈非色攝耶故前唯識之中例於餘方亦依色等有名句文亦同諸法顯義之體顯無方理故不取常規前淨名十地通取四者但言所用非正顯體四前淨名下會通前文但言所用者用此四法何必要四問曰若四中隨取但取名等豈不違於唯識離聲別有非正義耶答彼不離聲者假實合說今不離色假實亦存未爽通理仁王云是名句味諸佛所說故仁王云下五引證成立既但言名句味不云聲音明唯取名等此即仁王觀空品而文少略具云大王是經名句味百佛千佛百千億佛說名句味於恆河沙三千大千國中成無量七寶施三千大千國土中衆生皆得七賢四果不如於此經起一念信何況解一句者句非句非非句故今但意在有名句味無聲之言故不全引然大小諸宗雖通用四法而理不同謂薩婆多宗四法皆有實體經部聲有實體名等是假若大乘中或有四皆非實或有四皆如空俱不立故淨名云文字性離無有文字是則解脫十地論釋空中風相等云風喻音聲畫喻名字皆不可取佛藏經云諸法如毫釐不空者則諸佛不出世有說四皆事理無礙或說四皆圓融故宗不同也然大小諸宗下第三雙會謂會通四法大小不同或有四皆非實者即初教義名等假有聲是心變故或有四皆如空者然有二意一空為初門即屬初教二頓寂諸相即屬頓教今正當頓而引三經皆成頓義初引淨名即弟子品須菩提章以其被呵置鉢欲出維摩詰言唯須菩提取鉢勿懼於意云何如來所作化人若以是事詰寧有懼不我言不也維摩詰言一切諸法如幻化相汝今不應有所懼也所以者何一切言說不離是相至於智者不著文字故無所懼何以故文字性離無有文字是則解脫解脫相者即諸法也此明即言忘言通圓頓意二引十地經論以風畫合空皆不可取以此言教皆與證智而相應故不同風在樹葉畫在於壁但就教道則可見聞三引佛藏經亦證頓義即彼經第一念佛品中取意引耳經云舍利弗諸法若有決定體性如折毛髮百分一分者是則諸佛不出於世亦終不說諸法性空舍利弗諸法實空無性一相所謂無相如來悉知悉見如來以是說有念處舍利弗念處名為無處無非處無念無念業無想無分別無意無意業無思無思業無法無法相皆無合散是故賢聖名為無分別者是名念處上顯無念承便故來耳又下經云何等名為諸法實相所謂諸法畢竟空無所有以是畢竟空無所有法念佛復次如是法中乃至小念尚不可得是名念佛即其義也有說四皆事理無礙即終教意下即圓教意第四通攝所詮體者瑜伽八十一云謂契經體略有二種一文二義文是所依義是能依如是二種總名一切所知境界即依於六文顯於十義依於六文顯於十義者瑜伽云六文者謂一名二句三字四語五行相六機請十義者一地義二相三作意四依處五過患六勝利七所對八能治九略十廣可知上正辨通所詮此明教義相成若不詮義教文何用故通取所詮成契經體又十住品云文隨於義義隨於文文義相隨理無舛謬方為真教此明下出通所詮所以又瑜伽云佛菩薩等是能說者相語是能說相名句文身是所說相故皆通取不同前義尅取所說又瑜伽下又通收能所則有三重能所一以佛為能說人則聲等皆所說二唯語為能說則名等為所說以依語言顯屈曲故三四法皆能詮則前義為所詮故皆通取下對前揀別此中有二義第一通所詮則向下取第二通說者則向上取故說皆通不同前義尅取名等故云所說第五諸法顯義體者謂但能顯義理一切諸法皆為教體第五諸法顯義體中三初標舉次引證三結釋今初標舉略釋聲能顯義聲名為教六塵顯義六塵皆教淨名第三云有以光明而作佛事有以諸菩薩而作佛事有以佛所化人而作佛事有以佛菩提樹衣服臥具乃至八萬四千諸塵勞門衆生為之疲勞諸佛即以此法而作佛事淨名第三下二引證略引二經淨名即第三卷菩薩行品因阿難聞香自昔未有便問世尊世尊為說是淨名取於香積佛飯因問久如當消淨名為廣說乃至滅除一切諸煩惱毒然後乃消阿難白佛言未曾有也世尊如此香飯能作佛事佛言如是阿難或有佛土以佛光明而作佛事有以諸菩薩而作佛事有以佛所化人而作佛事有以菩提樹而作佛事有以佛衣服臥具而作佛事有以飯食而作佛事有以園林臺觀而作佛事有以三十二相八十隨形好而作佛事有以佛身而作佛事有以虗空而作佛事衆生應以此緣得入律行有以夢幻影響鏡中像水中月熱時𦦨如是等喻而作佛事有以音聲語言文字而作佛事或有清淨佛土寂寞無言無說無示無識無作無為而作佛事如是阿難諸佛威儀進止諸所施為無非佛事阿難有此四魔八萬四千諸煩惱門而諸衆生為之疲勞諸佛即以此法而作佛事是名入一切諸佛法門菩薩入此門者若見一切淨好佛土不以為喜不貪不高若見一切不淨佛土不以為憂不礙不沒今疏但撮略引耳然生公云若投藥失所則藥反為毒矣苟日得會毒為藥也是以大聖之為心病醫王觸事皆是法之良藥也苟達其會衆事皆畢矣菩薩既入此門便知佛土本是就應之義好惡者在彼於我豈有異哉所貴唯應但歎應生之奇耳又十卷楞伽第四云大慧非一切佛土言語說法故有佛國土直視不瞬口無言說名為說法乃至云有佛國土動身名說又十卷楞伽者文言稍博大旨無殊四卷若四卷經當其第二大慧白佛言世尊非言說有性有一切性耶世尊若無性者言說不生世尊是故言說有性有一切性佛告大慧無性而作言說謂兔角龜毛等世間現言說又云大慧非一切剎土有言說言說者是作相耳或有佛剎瞻視顯法或有作相或有揚眉或有動睛或歎或缺或謦咳或念剎土或動搖大慧如瞻視及香積世界普賢如來國土但以瞻視令諸菩薩得無生法忍及殊勝三昧是故非言說有性有一切性大慧見此世界蚊蚋蟲蟻是等衆生無有言說而各辨事釋曰以上所引證知皆教然楞伽意兼欲遣言反遣諸法思之可知十卷經中大同於此又香積世界餐香飯而三昧顯極樂佛國聽風柯而正念成絲竹可以傳心目擊以之存道又香積下第二結釋大意於中三初引例總收次結成說聽後況出一乘今初含有內外言香積世界餐香飯而三昧顯者亦是淨名經意而是香積品中又與前文影略前說色觸等今辨香之與味欲今六塵皆作佛事故經云爾時維摩詰問衆香菩薩香積如來以何說法彼菩薩曰我土如來無文字說但以衆香令諸天人得入律行菩薩各各坐香樹下聞斯妙香即獲一切德藏三昧得是三昧者菩薩所有功德皆悉具足釋曰此即以香顯三昧也又前文云與諸菩薩方共坐食有諸天子皆號香嚴悉發阿耨多羅三藐三菩提心即食味之益也又下菩薩品中明飯久如當消云未入正位食此飯者得入正位然後乃消又云已發大乘意食此飯者得無生忍然後乃消釋曰此即味為佛事故疏統收經意合二處經文也言極樂國土聽風柯而正念成者即阿彌陀經經云舍利弗極樂國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者皆自然生念佛念法念僧之心舍利弗極樂國土成就如是功德莊嚴以經對疏文義可知言絲竹可以傳心者即史記中事含其多事謂漏月傳意於秦王脫荊軻之手相如調文君之女終獲隨車況帝釋有法樂之臣馬鳴有和羅之伎皆絲竹傳心也言目擊以之存道者即莊子中事夫子欲見溫伯雪子久而不見及見寂無一言及出子路怪而問曰吾子欲見溫伯雪子久矣何以寂無一言子曰若斯人者目擊而道存亦不可以容聲者矣既語默視瞬皆說則見聞覺知盡聽苟能得法契神何必要因言說既語默下第二結成說聽語默視瞬皆說結前也見聞覺知盡聽顯後義也覺收鼻舌身之三根上既六塵皆說今則六根皆聽苟能下釋其聽義上則但能顯法為說此則但能得法為聽也況華嚴性海雲臺寶網同演妙音毛孔光明皆能說法況華嚴下第三況出一乘上通三乘內外皆有此理況復華嚴一乘圓宗何法非教於中四節一明事物說法言雲臺寶網者即十地經爾時世尊從眉間出清淨光明乃至云又亦照此娑婆世界佛及大衆並金剛藏菩薩身師子座已於上虗空中成大光明雲網臺時光臺中以諸佛威神力故而說頌言佛無等等如虗空十方無量勝功德人間最勝世中上釋師子法加於彼等即其文也又寶網者第一經云其師子座摩尼為臺蓮華為網下云復以諸佛威神所持演說如來廣大境界亦其文也又言雲者第六經初於一切供養具雲中自然出聲說等言毛孔光明皆能說法者即上十地經亦光明說又第九地云或時心欲放大光明演說法門或時心欲於其身上一一毛孔皆演法音又現相品云爾時諸菩薩光明中同時發聲說此頌言諸光明中出妙音普遍十方一切國演說佛子諸功德能入菩提之妙道等又法界品初諸來菩薩下方菩薩名破一切障勇猛智王與世界海微塵數菩薩俱來向佛所於一切毛孔中出說一切衆生語言海音聲雲出說一切三世菩薩修行方便海音聲雲等其文非一華香雲樹即法界之法門華香雲樹等者第二明即事是法更何論說以有託事顯法生解門故剎土衆生本十身之正體于何非教耶剎土衆生者第三明即事是能說人何但顯法剎土即國土身衆生即衆生身十身略舉其二以二是劣尚即十身況餘勝者於何非教者結成尚即能說況非教體下云剎說衆生說三世一切說又云一切世間諸境界皆悉能令轉法輪等其文非一下云下第四引證初引普賢行品如前教緣中釋第六攝境唯心體者總收前五並不離識第六攝境唯心體等者疏文分二先總明後然有下開章別釋前中亦二先正明後引證今初前之五體皆心所變心外無法如聲是色即二所現影況依聲上假立名等其教所詮及諸法顯義並離心無體唯識等云一切所有唯心現故起信亦云依一心法有二種門一心真如門二心生滅門然此二門皆各總攝一切法以此二門不相離故梵行品云知一切法即心自性故唯心現唯識等云下第二引證此引三文含於四教初引唯識即是初教故彼論名成唯識者唯遮外境識表內心離識之外更無別法彼引多教成立唯識亦引華嚴廣如彼論而言等者等有二意一等餘論二等餘經今初謂瑜伽雜集攝大乘等故無性攝論第四云論曰其有未得真智覺者於唯識中云何比知由教及理應可比知此中教者如十地經薄伽梵說如是三界皆唯有心又薄伽梵解深密經亦如是說釋論中云十地經者於彼經中宣說菩薩十種地義此即安立十地行相名句文身識所變現聚集為體謂彼聖者金剛藏識所變影像為增上緣聞者身中識上影現似彼法門如是展轉傳來于今說名為教故諸論皆引華嚴成立唯識即是第六地中一心所攝門經云佛子三界所有唯是一心如來於此分別演說十二有支皆依一心如是而立今由諸論皆已引之故疏下引但引梵行二又此等者等取楞伽等經頓教中義八識雖空而說唯識起信亦云下即終教中證此即彼論解釋分中顯示正義之文然其立義分中云摩訶衍者總說有二種云何為二一者法二者義所言法者謂衆生心是心即攝一切世間出世間法依於此心顯示摩訶衍義此即已明唯心義訖今取解釋分顯心性相真妄交徹知是終教按彼論賢首疏云一心者即如來藏心含於二義一約體絶相即真如門二隨緣起滅即生滅門此義至問明品當廣分別今但略證教體是心耳梵行品下即引當經以證圓教唯心知一切法即心自性非但心變而已然有二門一本影相對二說聽全收然有下開章別釋中先開章後別釋前中通就諸教以成四句一唯本無影謂即小乘不知唯識故釋中初釋本影中四句為四二亦本亦影謂大乘初教謂佛自宣說若文若義皆是如來妙觀察智相應淨識之所顯現名本質教第二句中分二先正明俱有後明聚集顯現前中亦二先引佛地論各別成立後引二十唯識雙證前義前中初即如來實有說法故名本質文通六文義通十義皆是已下顯文義本因位說聽由於意識故果位中亦唯意識故云妙觀察智相應淨識以果位中智強識劣故說此識與智相應此智能於大衆會中雨大法雨故能說法智所依王即是第六故云淨識之所顯現而言淨者純無漏故唯識疏云既無漏心現即真無漏文義為體是故世尊實有說法言不說者是密意說故佛地論第一云有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛說故佛地論第一云有義下引證可知若聞者識上所變文義名為影像佛地論云如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛說若聞者識上下明影像教託佛本質自心變故有漏心變則名等有漏佛地論下引證有影亦是前卷以佛為緣自心影像文義為果此文義相下釋妨若爾是自心變何名佛說故彼釋云自善為因佛力為緣影像為果今從於緣名佛說耳故二十唯識論云展轉增上力二識成決定護法論師等皆立此義故二十唯識下第二引二十唯識論雙證前二則本質影像二教齊有謂若聞者為增上緣則佛心相生若像為增上緣則聞者相生故云展轉增上力如來之識及聞者識名為二識決定成立本影之教言護法論師等者唯識諸師皆同此立故大乘疏云然此論主無不說法故取此解然云文義相生復說五心集現謂如說諸行無常即有四聲四字四名一句及所詮義此十四相於聞者識上聚集顯現然西方多釋今略舉其一謂如說諸字有率爾尋求二心然未定知諸事所屬無決定心次說行字由先熏習連帶解生有三心起謂率爾尋求決定以決定知諸字所屬一切行故聞諸行字雖知自性然未知義為令知義復說無字但有二心謂率爾尋求未有決定以未定知無字所屬後說常字由前字力展轉熏習連後字生具起五心謂率爾尋求決定染淨等流於最後時四字周圓方能解義總十二心初二次三次二後五故有十四相義如前說餘如別章然云文義等者第二明聚集顯現於中二先總明聚集之相後然西方下別釋五心多少言然西方多釋者相傳略有四解今疏即是第一唯識疏中亦唯此解斯乃總意故疏存之別有三師一云說諸字時率爾耳識同時意識但緣其聲是現量故尋求心中唯尋耳識所緣境故亦但緣聲不緣字名此之一心所變聲上雖有字名如生等相而不緣之至決定心緣聲字名有三相現說行字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名有六相現謂前二字各有三故說無字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名有九相現前之三字皆有聲字名故說常字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名經十二心有十四相謂四聲四字四名並句及義名為聚集若不散亂起染淨心及等流心若散亂時生心不定一云率爾耳識同時意識但緣於聲是現量故尋求心中緣聲字名非現量故由此極少經十二心有三六九十四相現名為聚集若不散亂決定心生若散亂時心生不定一云率爾耳識但緣於聲同時意識緣聲字名若爾者尋求意識尋何等名此中曲有二解一云四率爾耳識先緣其聲四同時意識緣聲字名是其現量以緣常聲時不緣諸等聲及字名故五識同時意識隨聲等皆現量故四尋求心方得圓滿經十二心有三六九十四相現名為聚集一云同時意識容非現量得緣過去經於八心四率爾耳識四同時意識有三六九十四相現名為聚集問同時意識既是現量何得緣字名耶答現量亦緣名等自相如理門論說不緣者不緣名義相繫屬故上約諸行無常說若法華中約諸惡者莫作然五字一句則具一百五相謂諸字有二相謂字及名惡字時七相者字時十六相莫字時三十相作字時五十相故成一百五相百法疏亦說此義言其五心初後通六識中三唯意識又前三是無記後二通善惡又率爾五識後必有尋求尋求心後或散或不散散即復起率爾識不散即起第三決定乃至等流又意識率爾自有二種一五識同時率爾意識緣現在境二獨頭率爾意識唯緣過去此中且說同時餘義廣如別章然此皆約未自在位以顯五心聚集顯現若自在位於一念中具足顯現如理思之言次說行字時由先熏習字時無常二字亦在未來其諸一字雖流過去現無本質由薰習力唯識變力仍於此念說行字時心上顯現下言連帶准此可思三唯影無本謂大乘實教離衆生心佛果無有色聲功德唯有如如及如如智獨存大悲大智為增上緣令彼所化根熟衆生心中現佛色聲說法是故聖教唯是衆生心中影像夜摩偈云諸佛無有法佛於何有說但隨其自心謂說如是法龍軍堅慧諸論師等並立此義三唯影無本者唯識論疏指無性論作如是說不取為正四非本非影如頓教說非直心外無佛色聲衆生心內影像亦空性本離故亡言絶慮即無教之教耳須彌偈云法性本空寂無取亦無見性空即是佛不可得思量淨名云夫說法者無說無示其聽法者無聞無得龍樹等宗多立此義龍樹等宗多立此義者等取頓教般若言多立者不必全爾有三觀故此但明空之一義故此前四說總合為一圓融無礙自淺至深攝衆生故此前四說下融為一味方順圓宗若約攝生則淺深有異第二說聽全收中成二四句第二說聽全收等者文中有三初標次釋後結融通今初標中所以成二四句者以真心融三則似事理無礙故須分之一約同教以成四句謂一佛真心外無別衆生以衆生真心即佛真心故則唯說無聽故所說教唯佛所現二衆生心外更無別佛以佛真心即衆生真心故則唯聽無說故所說教即衆生自現梵行品云知一切法即心自性等三佛真心現時不礙衆生真心現故說聽雙存二教齊立四佛即衆生故非佛衆生即佛故非衆生互奪雙亡則聽說斯寂故淨名云夫說法者無說無示其聽法者無聞無得初同教中初二句但以生佛同一真心故互相收三即互不相礙故得雙存四乃互相即故所以相泯並易可知二約別教以明四句謂由不壞相生佛互在故二約別教等者別教四句則唯約事事無礙由生佛兩相宛然互相在故亦可前是相即門後是相入門以前相即門中含事理無礙故且名同教耳一衆生全在佛中故則果門攝法無遺生尚在佛心中況所說教不唯佛現一衆生等者第一句有二先正立後引證今初此以佛果稱性故攝法無遺無有一法出法性故全性為佛故無法不攝故出現品云如來成正覺時於其身中普見一切衆生成正覺乃至普見一切衆生入涅槃故出現下後引證也初引當經如前已解至下本文重明又佛性論第二如來藏品云一切衆生悉在如來智內故名為藏以如如智稱如如境故一切衆生決定無有出如如境者並為如來之所攝持故名所藏衆生為如來藏次又佛性下引論然此品中說如來藏乃有三義今是其一言三義者論云復次如來藏義有三種應知何者為三一所攝藏二隱覆藏三能攝藏此即第一所攝藏也以為如來之所攝故名如來藏故彼論云一所攝名藏者佛說約住自性如如一切衆生是如來藏言如如者有二義一如如智二如如境並不倒故名如如言如來者約從自性來至至得是名如來故如來性雖因名應得果名至得其體不二但由清濁有異在因時為違二空故起無明而為煩惱所雜故名為染濁雖未即顯必當可現故名應得若至果時與二空合無復惑纍煩惱不染說名為清果已顯現故名至得譬如水性體非清濁但由穢不穢故有清濁名應得至得二種亦爾云云所言藏者一切衆生等與疏全同次下論即云復次藏有三種一顯正境無比離如如境無別一境出此境故二顯正行無比離此智外無別勝智過此智故三為現正果無比無別一果過此果故故曰無此由此果能攝藏一切衆生故說衆生為如來藏疏中所引但取佛含衆生之義故略引其中間耳下略引二藏二隱覆為藏者道前為煩惱覆衆生不見故三能攝為藏者果地一切功德應得性時攝之已盡故今取果攝故亦不引後之二藏又下出現品中明三世劫剎衆生所有心念根欲尚皆一身頓現況佛智廣大同虗空耶又下出現下三又引當經況出攝聽諸法皆攝何獨聽法衆生於中又二重舉況一明一身頓攝況於衆生二明智廣同空一切本居智內何用攝耶然第一文即出現偈云如三世劫剎衆生所有心念及根欲如是數等身皆現是故正覺名無量今疏上二句但略如及二字耳言尚皆一身頓現者即長行中意經云如來成正覺時以一相方便入善覺智三昧入已於一成正覺廣大身現一切衆生數等身住於身中如一成正覺廣大身一切成正覺廣大身悉亦如是然彼經長行以身攝身偈頌明其總攝今取長行之一身對偈中之廣攝以顯難思耳故言尚皆一身頓現此一尚字即是舉況一身總攝況聽法人況佛智下復舉況更彰廣大即第八十經普賢讚佛偈初經云佛智廣大同虗空普遍一切衆生心悉了世間諸妄想不起種種異分別今疏引者意通前半正取大智以況一身故但引初一句而已二佛在衆生心中故則因門攝法無遺佛尚在於心中況所說教非衆生心現二佛在衆生等者衆生即因因稱法界法界攝法無遺故衆生亦攝無遺矣故出現品云菩薩摩訶薩應智自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心一切衆生心亦復如是悉有佛正覺次故出現下引證此明佛證衆生心中真如成佛故本覺無異以始同本總在衆生心中從體起用應化身時即是衆生心中真如用大更無別佛如起信中多明此義而是自心體用今以此經心佛衆生無差別故佛證衆生之體用衆生之用後此明佛證下解釋謂如來何以不離生心釋云衆生心真如是佛所證故若爾但是平等之理何足為玄故復次云本覺無異故謂佛本覺與衆生本覺無有二體同一覺故本覺即法身故法身同故若爾法身體同衆生未證佛證法身復何相預故次云以始同本總在衆生心中謂起信既言始覺同本覺無復始本之異生佛本覺既同今佛始同本時全同衆生本覺故全在衆生心中矣復有問云約體雖同相明自別豈得全同故次云從體起用用不異體體既衆生之體用豈離於衆生故依體起用即是衆生心中真如用大更無別佛若爾起信論中已有此義何以獨名華嚴為別教耶故次釋言起信雖明始本不二三大攸同而是自心各各修證不言生佛二互全收是則用起信之文成華嚴之義妙之至也疏文可知三由前生佛互相在時各實非虗則因果交徹隨一聖教全在二心三由前生佛互相在下但合前二並實非虗成此句耳謂初佛攝時生即全攝無前無後故實非虗生攝非虗教在生心佛攝非虗教在佛心耳故衆生心中佛為佛心中衆生說法佛心中衆生聽衆生心中佛說法故衆生心中佛下顯雙存相謂雖雙互相攝不妨說聽宛然在文似隱義極分明請以喻況略舉二喻一者如一明鏡師弟同對說聽以師取之即是師鏡弟子取之是弟子鏡鏡喻一心師弟喻生佛是謂弟子鏡中和尚為和尚鏡中弟子說法和尚鏡中弟子聽弟子鏡中和尚說法諸有智識請詳斯喻此喻猶恐未曉又如水乳和同一處而互為能和所和且順說聽以能和為說所和為聽且將水喻於佛乳喻衆生應言乳中之水和水中之乳水中之乳受乳中之水雖同一味能所宛然雖能所宛然而互相在相遍相攝思以准之更消疏文衆生心中佛者此明衆生稱性普周而佛不壞相在衆生心內言為佛心中衆生說法者此明佛心稱性普周而衆生不壞相在佛心內也但明能說之佛即是衆生心中佛但語聽法衆生即是佛心中衆生下對反上更無別理但說聽之異耳四由生全在佛則同佛非生佛全在生則同生非佛兩相形奪二位齊融則隨一聖教俱非二心則佛心中衆生生無聽衆生心中佛無說是以賢首品云因緣所生無有生諸佛法身非是身又偈讚品云如來不說法亦不度衆生大般若四百二十五云我從得道來不說一字汝亦不聞等四由生全在等者此句雙泯義更易了於中先正明是以賢首下引證即第十五經但證第四雙非之義因緣所生無有生生泯也諸佛法身非是身佛泯也下半云法性常住如虗空以說其義光如是正要前二句故不引此耳又偈讚品亦證雙非大般若文前已釋竟是故此四於一聖教圓融無礙方為究竟甚深唯識道理是故此四下總結融通隨舉一句即須具四故隨一文一句若大若小必具此四攝理周圓第七會緣入實體者前來六門同入一實故第七會緣入實體等者疏文分二初總明後亦有下開釋亦有二義一以本收末二會相顯性前中以諸聖教從真流故不異於真故攝論中名為真如所流十二分教唯識第十釋勝流真如云謂此真如所流教法於餘教法最為勝故攝論中下引證此引無性攝論第七梁攝論第十次引唯識第十彼論釋十真如中第三地如彼疏釋云由此地中得於三慧照大乘法觀此法教根本真如名勝流真如或證此如說法勝故彼宗雖不立真如隨緣而說佛正體智證最清淨法界而於後得安立教法名為如流以本收末亦名如為教體彼宗雖不立下釋妨謂有問言彼宗真如凝然何有流義故疏通云而說佛正體等此中逆順總有四法展轉相依若逆推者此之教法從何而立答從佛後得智立此後得智復依何生由根本智故論云了俗由證真故說為後得此根本智從何而立由冥真如故名真如最為根本若順說者梁論第十釋云真如於一切法中最勝由緣真如起無分別智無分別智是真如所流此智於諸智中最勝由此智流出後得智後得智所生大悲此大悲於一切定中最勝因此大悲如來欲安立正法教濟衆生說大乘十二部經此法是大悲所流此法於一切法中最勝菩薩為得此法一切難行能行難忍能忍由觀此法得入三地在文可知二會相顯性者謂彼一切差別教法從緣無性即是真如是故虗相本盡真性本現二會相顯性者上說如為教本而教非即如今說教即是如則攝十二分教之相歸即如之性也如來言說皆順於如故金剛三昧經云如我說者義語非文衆生說者文語非義仁王二諦品云大王法輪者法本如應頌如乃至論議如等如來言說下重釋教即如義上明教從緣生無有自性故教即如今明說主稱如故言教皆如金剛三昧經證成此義言義語者皆契如故下引仁王證成前義言乃至者文中略故若具經云波斯匿王白佛言云何十方諸如來一切菩薩不離文字而行諸法相大王法輪者法本如重頌如授記如不頌偈如無問而自說如戒經如譬喻如法界如本事如方廣如未曾有如論議如是名句味音聲果文字記句一切如若取文字者不行空也大王如如文字修諸佛智母上即經文其中云戒經者即因緣經因事制戒故乃因緣經中一義又言法界如者即本生經界即因義故餘文可知十二分名義十藏品說此經明教即是如不說如皆是教若取說法顯義皆為教體一切法皆如也則無如非教此經明教即是如下復辨通局謂但言十二分教即如此局在十二若云如即佛教則一切法皆如也則一切皆佛教斯義則通故次疏云若取諸法顯義體即明一切皆教既一切皆如如皆佛教也第八理事無礙體者謂一切教法雖舉體即真不礙十二分等事相宛然顯現雖真如舉體為一切不礙一味湛然平等由如無礙佛之音聲亦順如無礙皆與如智而相應故如前義分齊中廣明第八理事無礙體等者在文可見第九事事無礙體者文義皆圓第九事事下疏文分三初雙標次正顯文後例釋義今初雙標文義揀義取文耳文即圓音此中亦具十種玄門現相品云佛演一妙音周聞十方國衆音悉具足法雨皆充遍即同時具足相應體十住品云欲具演說一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發必即廣狹無礙體亦名純離教一句不壞狹也純也文義不同廣也雜也又云於一法中解衆多衆多法中解了一等皆一多相容教也出現品云如來音聲普入一切譬如書字等此亦相入即相容也十住又云一即是多多即一文隨於義義隨文即相即教體出現品云道場皆聞不出衆外各各隨解即隱顯教體也又云如來言音唯是一味隨諸衆生心器異故無量差別亦隱顯教體亦純雜教也又云如來於一語言中演說無邊契經海如善口女等即微細教也阿僧祇品云於彼一一修多羅分別諸法不可說於彼一一諸法中又說諸法不可說等一法既爾餘法亦然交映重重無盡無盡即帝網教也觸事即法即託事生解教也一念頓演即十世教也如諸會中此方所說十住等十方亦爾即主伴教也若隨說一法門皆有無量修多羅為眷屬等即眷屬教雖不得為主亦是伴類次文即下正顯文圓文即名句文而言圓音者有二義故一例上名等離聲無體今圓音體文亦依之二者既言圓音則文句皆足方稱圓耳若一直聲音義非正下引諸經成斯教體具十玄門言佛演一妙音等者經文略有三節初則一音周聞但彰其遍次云衆音悉具者即前一音頓具多音理萬類殊音如善口天女三法雨皆遍者則隨一一音具說一切大小權實無盡法門又一一門皆充法界三節已含四義一則展一普周二則一收一切展卷無礙皆悉同時何音何法而不具足彼經次下云一切言詞海一切隨類音一切國土中恆轉無上輪等則重數更多今但引其一偈足顯同時具足言譬如書字等者即如來轉法輪中取意略引故有等言若具引者經云佛子如來法輪悉入一切語言文字而無所住譬如書字普入一切事一切語一切等數一切世間出世間處而無所住如來音聲亦復如是普入一切處一切衆生一切法一切業一切報中而無所住一切衆生種種語言皆悉不離如來法輪何以故言音實相即法輪故佛子菩薩摩訶薩於如來轉法輪應如是知即此經文法喻之中亦自影略故疏取意略引耳言此亦相入即相容也者據所引文即相入義即此相入是一多相容不同門能入名入所入名容能容即所入所容即能入隨義名異容入一義耳言道場皆聞不出衆外者即出現音聲中梵王及衆喻若具引者復次佛子譬如大梵天王住於梵宮出梵音聲一切梵衆靡不皆聞而彼音聲不出衆外諸梵天衆咸生是念大梵天王獨與我語如來妙音亦復如是道場衆會靡不皆聞而其音聲不出衆外何以故根未熟者不應聞故其聞音者皆作是念如來世尊獨為我說佛子如來音聲無出無住而能成就一切事業是為如來音聲第五相釋曰衆會聞者即以根熟為衆內未熟為衆外耳餘則可知應者得聞此即顯也不應不聞斯即隱也各各隨解者聞中復有差別若聞大乘大乘則顯不聞二乘二乘即隱小顯大隱等可知又云如來言音等者即彼次下第六相也經云佛子譬如衆水皆同一味隨器異故水有差別水無念慮亦無分別如來言音亦復如是唯是一味謂解脫味隨諸衆生心器異故無量差別而無念慮亦無分別然此一文證其兩義若取諸器各受互不相知即是隱顯若取一味隨器即是純雜善口天女亦即彼品經云復次佛子譬如自在天王有天婇女名曰善口於其口中出一音聲其聲則與百千種樂而共相應一一樂中復有百千差別音聲佛子彼善口女從口一聲出於如是無量音聲當知如來亦復如是於一音中出無量聲隨諸衆生心樂差別皆悉遍至悉令得解即第四相一中頓具即微細也言阿僧祇品至不可說等者等餘經文經云一一佛法不可說種種清淨不可說出妙音聲不可說轉正法輪不可說於彼一一法輪中演修多羅不可說於彼一一修多羅分別法門不可說於彼一一法門中又說諸法不可說於彼一一諸法中調伏衆生不可說此上經文已有數重而但說一法法法皆爾互入重重故成無盡又彼中云清淨實相不可說說修多羅不可說於彼一一修多羅演說法門不可說於彼一一法門中又說諸法不可說於彼一一諸法中所有決定不可說於彼一一決定中調伏衆生不可說不可言說同類法不可言說同類心不可言說異類法不可言說異類心不可言說異類根不可言說異類語念念於諸所行處調伏衆生不可說等亦是其類也言一念頓演者一念頓演無量劫法何有十世不互相融第五經云樹下諸神剎塵數悉共依於此道場各各如來道樹前念念宣揚解脫門等此且約言說若類通諸法皆為教體即所論義義即普法具十玄門如義分齊此且約下例文釋義初句結前餘皆釋後第十海印炳現體者如前差別無盡教法皆是如來海印定中同時炳現設所化機亦同緣起炳現定中是故唯以三昧為斯教體如出現品云此約果位若約因位圓信亦得印現賢首品云如是一切皆能現海印三昧威神力以上十門該羅收攝未有一法而非教體然後二門正是經宗融取前八無所遺矣以上十門下第二總結可知教體門竟

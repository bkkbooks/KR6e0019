front:
  text: 大方廣佛華嚴經疏演義鈔大方廣佛華嚴經疏演義鈔序釋文將釋此序大文分三初明題目次辨撰人後解本文初中經疏鈔題具如下釋序者由也始也陳教起之因由作法興之漸始故名為序又序因鈔起鈔因疏起疏因經起三重次第展轉相由疏主仰遵聖德而有述作故通序之冠於鈔首故名序也清涼山大華嚴寺沙門澄觀述次撰人者清涼山大華嚴寺寺者即所依處也清涼者瑞靉凝空茂林森聳夏仍飛雪冬積堅氷曾無炎暑故曰清涼山者峙也地踴層巒眾峯齊峙岷峨拂漢峭嶺倚天故名山也大華嚴寺者一藍之局號亦名華園寺寺前有園地方數頃名華間發瑞草時敷有異常境故名華園寺沙門者正舉能述人也梵語具云室囉末拏此云懃息經云息心達本源故號為沙門然有勝義世俗示道污道之異如十輪經次二字即疏主號也唐歷九宗聖世而為七帝門師特賜清涼之號廣如傳述者疏主自謙言不作也意云我但撰述古人之義為此鈔文非新製作也至聖垂誥鏡一心之玄極大士弘闡燭微言之幽致至聖下三本文中二初教起源流後鈔興本末初中二初通明諸教後別指當經又初中四一明如來說經二明菩薩造論三縱奪遣妨四出示經意今初明如來說經就二段中具彰三寶至聖佛也垂誥法也大士僧也三寶最吉祥故我經初說至者極也聖者正也為如來能以正智證窮法界更無過者故名至聖又至揀因位聖揀凡夫集玄記云聖者生也視物之生知其終始智通乎大道應變而無窮故名至聖然諸教不同略分為五初小乘教以五分身為法身丈六身為報身隨類為化身名至聖二大乘始教中有二宗一破相宗中以勝義諦中離一切相非蘊界處為法身智隨物現為報化身名至聖二立相宗中以清淨法界為法身四智相應心品所現為報化身為至聖三終教依起信論以體大為法身相大為受用身用大為他報化身為至聖四頓教中不分三異絕待離言一實之性為至聖五圓教即以法界無盡身雲真應相融一多無礙圓滿十身為至聖若具實為論唯圓教佛方名至聖垂誥者即所說之教也垂者布也垂布典誥宣揚法化利益眾生故云垂誥又尚書有大誥康誥等篇告上曰告發下曰誥有云王言為誥皆不定也今謂如來演說三乘十二部經利益有情故云垂誥鏡一心等者鏡者喻也鏡有照鑑之功喻能詮教法鏡中之像喻一心玄極即所詮之法也清涼云以聖教為明鏡照見自心以自心為智燈照經幽旨即斯意也今依五教略明一心初小乘教中實有外境假立一心由心造業所感異故二大乘始教中以異熟賴耶為一心遮無外境三終教以如來藏性具諸功德故說一心四頓教以泯絕無寄故說一心五圓教中總該萬有事事無礙故說一心良以如來隨機設教故有千差殊途同歸皆一致也玄極者深妙也又玄者幽也遠也極者盡也謂至理幽奧深遠難測故老子云杳冥之內眾妙存焉皆不思議之境也又海慧禪師云森羅萬象至空而極百川眾派至海而極一切聖賢至佛而極一切教法至圓而極故云玄極大士下菩薩造論筆削記云發大心信大法解大教修大行證大果故名大士又大士者有德之稱也此通凡聖若論弘闡亦兼餘疏鈔主也是以西域東夏造論釋經或則地上菩薩或則當代英賢皆思拔群位智出眾情弘道利生故名大士弘闡者弘者大也闡者開也或分宗立教或顯正推邪或高建法幢或廣揚聖化皆為弘闡也燭謂燈燭有照了之義故下經云譬如暗中寶無燭不可見佛法無人說雖慧莫能了然上云鏡者在明即見如對上根見經生解也言燭者在暗即見如諸下根覩疏鈔文方乃生解亦如起信之說四根法華之明三品皆其意也微言者微妙之法故名微言唯識云激河辯而贊微言等孝經序云夫子沒而微言絕皆以聖教為微言也幽致者幽者遠也致者趣也即上玄極之理幽遠深邃故云幽致雖忘懷於詮旨之域而浩汗於文義之海雖忘懷下次縱奪遣妨二初縱法本離言後奪不礙言說今初雖者縱其無言應有問云上言理趣玄極微言幽隱忘懷絕慮方可契會何用廣陳言教翻欲擾人耶故縱云雖忘懷於詮旨之域忘懷者忘情絕慮謂之忘懷詮旨者所詮理也域者疆域謂能詮三藏有包含義故今皆超之故云爾也而浩汗下奪其無言不碍言也謂諸佛菩薩有大智故上契無為有大悲故下垂言教浩汗者大水之貌疏序云湛湛忘言而教海之波瀾浩汗謂此大經文廣理深故喻如海蓋欲寄象繫之迹窮無盡之趣矣蓋欲下四出示經意二初舉例設教後因言悟入今初舉例設教蓋者承前起後發語之端欲者將也寄者託也象繫者象謂爻象繫者繫辭即周易十翼之文謂一上彖下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十鄭學之徒並同此說皆孔子所作讚明易道發揮至頤有類菩薩造論釋經之意跡者蹤跡如尋其兔先尋其跡得兔忘跡得象忘言謂假託言象之跡以契言絕之理下經云了法不在言善入無言際而能示言說如響遍世間即其意也窮無盡下因言悟入窮者盡也易云窮理盡性以至於命無盡之趣者即上一心玄極之理謂假託言象以契無言非有無言可為棲託下經云雖復不依言語道亦復不著無言說也故知文字性離雖終日言而無言豈可緘言而守默哉斯經文理不可得而稱也斯經下別顯當經以伸旨趣分二初標指後嘆勝初也謂此大經文言廣博非心可測就言象中略標三本上本經有十三千大千世界微塵數偈一四天下微塵數品中本經有四十九萬八千八百偈一千二百品下本經有十萬偈四十八品今所傳者是略本經有四萬五千偈豈況此經一字法門海墨書而不盡也理者所詮義也橫該三藏竪貫十宗六相十玄重重妙用無盡教體海印發揮菩薩猶迷聲聞不測豈非斯經文理不可得而思議矣不可得而稱也者後歎勝也晉譯幽祕賢首頗得其門後晉譯下鈔興本末二初依經製疏後請集鈔文初文分三初晉譯先彰二唐翻後闡三疏成廣播初中二初旨趣玄微後賢首得旨且初旨趣玄微晉譯者東晉安帝義熈十四年覺賢三藏所譯六十卷經譯者傳也傳梵為華故言翻譯幽者隱也祕者密也晉經文多隱奧取悟無由故云幽祕賢首下後賢首得旨纂靈記云僧法藏字賢首洞悟真宗深窮法界造探玄記解釋晉經雖有古德多家疏文唯賢首一人多得其妙故云頗得其門唐翻靈篇後哲未窺其奧唐翻下唐翻後闡二初新經罔傳後刊定迷宗今初也唐翻靈篇者正譯時即當則天設正改唐為周至中宗立却復舊號為大唐今云唐翻者據復號為言靈篇者靈妙篇章又多靈感故云靈篇後哲下刊定迷宗哲者智也即指淨法苑公造刊定記二十卷以解唐經未窺者窺者視也未窺者不見也刊定釋義多失經旨所以未見經中之玄奧也論語云叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬如宮墻賜之墻也及肩闚見室家之好夫子之墻數仞不得其門而入不見室家之美百官之富得其門者寡矣今借其文以喻華嚴之室深奧而刊定未達故云未窺玄奧故清涼嘆曰大哉新經而無得意之疏安可指南乃興述作之意也不揆膚受輙闡玄微不揆膚受下三疏成廣播二初陳謙述後疏遠流通今初陳謙述也揆者度也膚者皮也皮膚之受故云膚受論語云膚受之愬馬融曰膚外語受非內實也東京賦云末學膚受貴耳而賤目也濟曰所受膚薄貴於耳而賤於目意云我不自度膚淺之學輙便解釋此經是自專也偶溢九州遐飛四海偶溢九州下疏遠流通偶者不期而會溢者盈滿之義九州者通典云雍荊青豫冀幽兗楊徐是為九州遐飛者遐者遠也飛揚也四海者東夷西戎南蠻北狄為之四海疏主謙云我所造疏自備遺忘教示童蒙非敢望於遠布怱然盈溢於九州遠揚於四海之內也觀其噬像之夢而飛龍之瑞實乃洞契佛心使之然也講者盈百咸叩余曰大教趣深疏文致遠親承指訓髣髴近宗講者下後請集鈔文四初學徒咨請二冀遠重宣三法師承領四述作體式且初中四初標眾二陳詞三按定四謙承且初標眾講者解也論也解釋文義論量邪正教示學徒名為講者或則當代英賢或則聽習之者盈滿百人同時伸請咸叩下二陳詞咸者皆也叩者擊也余者我也意云講者百人皆詣我所用言擊勵勸造鈔也大教下三按定大教揀非泛常之典乃如來不思議大威德法門故云大教趣者旨也深也既所釋之經洪深故能釋之疏幽遠親承下四謙承即當時聽習之者口傳心授啟悟真宗髣髴者相似之義唯識疏云雖則髣髴糟粕未能曲盡幽玄意云我等非敢洞明幽趣親蒙指訓相似近宗也垂範千古慮惑高悟希垂重剖得覩光輝垂範下二冀遠重宣二初慜後後正請且初慜後垂者布也範者儀範千口所傳為古今云千古者乃萬世之津粮矣慮者思慮惑者疑也慮恐傳之後世疑惑高遠之悟希垂下二正請希望再作鈔文剖拆疏義燦然明白故云得覩光輝順斯雅懷再此條治名為隨疏演義昔人云人在則易人亡則難今為此釋冀遐方終古皆若面會順斯下三法師承領三初明製鈔意次引古釋成後出製鈔意且初明製鈔意雅者正也懷者情懷順斯雅正之懷重啟利生之念再謂條貫義理令無盡法門宛如在目尚書云如網在綱有條而弗紊注云如網在綱有條而不亂也故名隨疏演義鈔昔人下引古釋成纂玄等述楊子書造船之事而未見文不敢依憑今依楊子法言問經之難易曰存亡或不敏者請益則曰人在則易有所請益人亡則難無所請益今為下出製鈔意今為順請重釋此疏冀望遠方流通於後世凡有覩斯鈔文皆如與我面對即疏主普現色身三昧之謂也然繁則倦於章句簡則昧其源流顧此才難有慚折衷意夫後學其辭不枝矣然繁則下四述作體式三初正顯次謙陳後出理且初正顯為離廣略二過疏云文華尚然翳理繁言豈不亂心故知所作則不易也顧此下次謙陳才難論語泰伯篇孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已注云國才難得當唐虞盛世欲十人內有婦人只九人矣所以折衷之才難得故疏主謙云我無折衷之才輙述鈔文實為慚愧意夫下後出理若離繁簡二失注述鈔文庶使學者其詞無枝蔓矣釋鈔序竟
